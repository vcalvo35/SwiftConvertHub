<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TLQEN72B5R"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-TLQEN72B5R');

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact &#8212; SwiftConvertHub</title>
  <meta name="description" content="Contact the SwiftConvertHub team. Send us a message with suggestions, bug reports or feedback." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://swiftconverthub.com/contact.html" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-512.png">
  <link rel="apple-touch-icon" href="/assets/logo-square-light.png">
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .contact-form { display:flex; flex-direction:column; gap:16px; margin-top:24px; }
    .form-group { display:flex; flex-direction:column; gap:6px; }
    .form-group label { font-size:.85rem; font-weight:600; color:var(--text-muted); }
    .form-group input, .form-group textarea, .form-group select {
      padding:10px 14px; border:1.5px solid var(--border); border-radius:var(--radius-sm);
      background:var(--bg); color:var(--text); font-family:var(--font); font-size:.95rem;
    }
    .form-group textarea { min-height:130px; resize:vertical; }
    .form-group input:focus, .form-group textarea:focus { outline:none; border-color:var(--primary); }
  </style></head>
<body data-page="contact">
  <div id="nav-placeholder"></div>

  <section class="section">
    <div class="container" style="max-width:640px">
      <div class="section-label" data-i18n="contact_label">Contact</div>
      <h1 style="font-family:var(--font-head);font-size:2rem;font-weight:700;color:var(--text);margin:12px 0 8px;" data-i18n="contact_h1">Get in Touch</h1>
      <p style="color:var(--text-muted);margin-bottom:4px;" data-i18n="contact_p">Have a suggestion, found a bug, or just want to say hello? Send us a message.</p>
      <form class="contact-form" action="mailto:info@swiftconverthub.com" method="get" enctype="text/plain">
        <div class="form-group">
          <label for="cf-name" data-i18n="contact_name_label">Your Name</label>
          <input type="text" id="cf-name" name="name" placeholder="John Doe" required />
        </div>
        <div class="form-group">
          <label for="cf-email" data-i18n="contact_email_label">Email Address</label>
          <input type="email" id="cf-email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="cf-subject" data-i18n="contact_subject_label">Subject</label>
          <select id="cf-subject" name="subject">
            <option>Bug Report</option>
            <option>Suggestion</option>
            <option>General Question</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="cf-msg" data-i18n="contact_msg_label">Message</label>
          <textarea id="cf-msg" name="body" placeholder="Tell us what&#8217;s on your mind..." required></textarea>
        </div>
        <button type="submit" class="btn-primary" style="align-self:flex-start" data-i18n="contact_submit">Send Message &#128640;</button>
      </form>
    </div>
  </section>

  <div id="footer-placeholder"></div>
  <script src="js/components.js"></script>
</body>
</html>
